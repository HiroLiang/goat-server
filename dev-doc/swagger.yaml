basePath: /
definitions:
  account.GetProfileResponse:
    properties:
      account_name:
        type: string
      current_user:
        $ref: '#/definitions/account.UserProfileItem'
      email:
        type: string
      public_id:
        type: string
      status:
        type: string
      user_ids:
        items:
          type: integer
        type: array
    type: object
  account.LoginRequest:
    properties:
      device_id:
        type: string
      identifier:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - device_id
    - identifier
    - password
    type: object
  account.LoginResponse:
    type: object
  account.RegisterRequest:
    properties:
      account:
        type: string
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - account
    - email
    - name
    - password
    type: object
  account.RegisterResponse:
    type: object
  account.UserProfileItem:
    properties:
      avatar:
        type: string
      id:
        type: integer
      name:
        type: string
      role_codes:
        items:
          type: string
        type: array
    type: object
  account.VerifyEmailResponse:
    type: object
  chat.ChatMessageInfoResponse:
    properties:
      content:
        type: string
      created_at:
        type: string
      is_edited:
        type: boolean
      message_id:
        type: integer
      reply_to_id:
        type: integer
      sender_id:
        type: integer
      type:
        type: string
    type: object
  chat.ChatRoomMemberInfoResponse:
    properties:
      avatar_url:
        type: string
      display_name:
        type: string
      joined_at:
        type: string
      last_read_at:
        type: string
      member_id:
        type: integer
      participant_id:
        type: integer
      role:
        type: string
    type: object
  chat.ChatRoomSummaryResponse:
    properties:
      avatar_url:
        type: string
      display_name:
        type: string
      latest_message:
        type: string
      room_id:
        type: integer
      room_type:
        type: string
      unread_count:
        type: integer
    type: object
  chat.CreateRoomRequest:
    properties:
      allow_agent:
        type: boolean
      description:
        type: string
      max_members:
        type: integer
      name:
        type: string
      type:
        type: string
    type: object
  chat.CreateRoomResponse:
    properties:
      allow_agent:
        type: boolean
      created_at:
        type: string
      id:
        type: integer
      max_members:
        type: integer
      name:
        type: string
      type:
        type: string
    type: object
  chat.GetChatRoomDetailResponse:
    properties:
      avatar_url:
        type: string
      description:
        type: string
      members:
        items:
          $ref: '#/definitions/chat.ChatRoomMemberInfoResponse'
        type: array
      messages:
        items:
          $ref: '#/definitions/chat.ChatMessageInfoResponse'
        type: array
      name:
        type: string
      room_id:
        type: integer
      room_type:
        type: string
    type: object
  chat.GetChatRoomMessagesResponse:
    properties:
      has_more:
        type: boolean
      messages:
        items:
          $ref: '#/definitions/chat.ChatMessageInfoResponse'
        type: array
    type: object
  chat.GetUserChatRoomsResponse:
    properties:
      bot:
        items:
          $ref: '#/definitions/chat.ChatRoomSummaryResponse'
        type: array
      channel:
        items:
          $ref: '#/definitions/chat.ChatRoomSummaryResponse'
        type: array
      direct:
        items:
          $ref: '#/definitions/chat.ChatRoomSummaryResponse'
        type: array
      group:
        items:
          $ref: '#/definitions/chat.ChatRoomSummaryResponse'
        type: array
    type: object
  chat.JoinRoomResponse:
    properties:
      invitation_id:
        type: integer
      joined_at:
        type: string
      member_id:
        type: integer
      role:
        type: string
      status:
        type: string
    type: object
  chat.MemberStatusInfoResponse:
    properties:
      last_read_at:
        type: string
      member_id:
        type: integer
    type: object
  chat.ResolveInvitationRequest:
    properties:
      approve:
        type: boolean
    type: object
  chat.ResolveInvitationResponse:
    properties:
      invitation_id:
        type: integer
      joined_at:
        type: string
      member_id:
        type: integer
      role:
        type: string
      status:
        type: string
    type: object
  chat.UpdateMemberStatusResponse:
    properties:
      members:
        items:
          $ref: '#/definitions/chat.MemberStatusInfoResponse'
        type: array
    type: object
  device.DeviceUpdateRequest:
    properties:
      device_name:
        type: string
      platform:
        type: string
    required:
    - device_name
    - platform
    type: object
  device.DeviceUpdateResponse:
    properties:
      created_at:
        type: string
      device_id:
        type: string
      device_name:
        type: string
      platform:
        type: string
      success:
        type: boolean
    type: object
  device.GetDeviceInfoResponse:
    properties:
      created_at:
        type: string
      device_id:
        type: string
      device_name:
        type: string
      platform:
        type: string
      success:
        type: boolean
    type: object
  device.RegisterDeviceIdRequest:
    properties:
      device_id:
        type: string
      device_name:
        type: string
      platform:
        type: string
    required:
    - device_id
    - device_name
    - platform
    type: object
  device.RegisterDeviceIdResponse:
    properties:
      created_at:
        type: string
      device_id:
        type: string
      device_name:
        type: string
      platform:
        type: string
      success:
        type: boolean
    type: object
  participant.ParticipantResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      user_id:
        type: integer
    type: object
  response.ErrorResponse:
    properties:
      code:
        type: string
      details:
        additionalProperties: {}
        type: object
      message:
        type: string
    type: object
  user.GetUserProfileResponse:
    properties:
      avatar:
        type: string
      id:
        type: integer
      name:
        type: string
      role_codes:
        items:
          type: string
        type: array
    type: object
  user.UpdateProfileRequest:
    properties:
      name:
        maxLength: 50
        minLength: 1
        type: string
      role_codes:
        items:
          type: string
        type: array
    required:
    - name
    type: object
  user.UploadAvatarResponse:
    properties:
      avatar_url:
        type: string
    type: object
host: dev.hiroliang.com
info:
  contact: {}
  description: Server for my all Goat application
  title: Goat-Server
  version: 1.0.0
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/account.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/account.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Account Login
      tags:
      - Auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: Remove the session token from the redis store.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Account Logout
      tags:
      - Auth
  /api/auth/profile:
    get:
      description: Get the current account and user profile
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/account.GetProfileResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get account profile
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: register with email and password
      parameters:
      - description: Register messages
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/account.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/account.RegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Account register
      tags:
      - Auth
  /api/auth/verify-email:
    get:
      description: Verify account email using the token sent during registration
      parameters:
      - description: Verification token
        in: query
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/account.VerifyEmailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Verify email address
      tags:
      - Auth
  /api/chat/room:
    post:
      consumes:
      - application/json
      description: Create a new chat room (direct, group, channel, or bot). The creator
        becomes the owner member.
      parameters:
      - description: Room creation payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/chat.CreateRoomRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/chat.CreateRoomResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a chat room
      tags:
      - Chat
  /api/chat/room/{room_id}:
    get:
      description: Retrieve full detail of a chat room including member list and recent
        messages.
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chat.GetChatRoomDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Room Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get chat room detail
      tags:
      - Chat
  /api/chat/room/{room_id}/join:
    post:
      description: Join an existing chat room. For open rooms the member is created
        immediately; for invite-only rooms a pending invitation is created.
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chat.JoinRoomResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Room Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Already a member
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Join a chat room
      tags:
      - Chat
  /api/chat/room/{room_id}/member/status:
    patch:
      description: Mark the authenticated user's last-read timestamp for the given
        room, returning all members' statuses.
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chat.UpdateMemberStatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Room Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update member read status
      tags:
      - Chat
  /api/chat/room/{room_id}/messages:
    get:
      description: Retrieve paginated messages for a chat room. Use before_id for
        cursor-based pagination.
      parameters:
      - description: Room ID
        in: path
        name: room_id
        required: true
        type: integer
      - description: Return messages with ID less than this value (pagination cursor)
        in: query
        name: before_id
        type: integer
      - description: Maximum number of messages to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chat.GetChatRoomMessagesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Room Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get chat room messages
      tags:
      - Chat
  /api/chat/room/invitations/{invitation_id}:
    patch:
      consumes:
      - application/json
      description: Approve or reject a pending join invitation. Only the room owner/admin
        can approve.
      parameters:
      - description: Invitation ID
        in: path
        name: invitation_id
        required: true
        type: integer
      - description: Approval decision
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/chat.ResolveInvitationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chat.ResolveInvitationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Invitation Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Resolve a join invitation
      tags:
      - Chat
  /api/chat/rooms:
    get:
      description: Retrieve all chat rooms the authenticated user belongs to, grouped
        by room type (direct, group, channel, bot).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chat.GetUserChatRoomsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user chat rooms
      tags:
      - Chat
  /api/device/{device_id}:
    get:
      consumes:
      - application/json
      description: try to get device info
      parameters:
      - description: Device id
        in: path
        name: device_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Device info
          schema:
            $ref: '#/definitions/device.GetDeviceInfoResponse'
      summary: getDeviceInfo
      tags:
      - Device
    patch:
      consumes:
      - application/json
      description: try to update device info
      parameters:
      - description: Device id
        in: path
        name: device_id
        required: true
        type: string
      - description: Device update payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/device.DeviceUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/device.DeviceUpdateResponse'
      summary: updateDeviceInfo
      tags:
      - Device
  /api/device/register:
    post:
      consumes:
      - application/json
      description: try to register device id checking is id already registered
      parameters:
      - description: Register device
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/device.RegisterDeviceIdRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/device.RegisterDeviceIdResponse'
      summary: registerDeviceId
      tags:
      - Device
  /api/health:
    get:
      description: api health check
      responses: {}
      summary: api health check
      tags:
      - Health
  /api/participant/me:
    get:
      description: Retrieve the authenticated user's chat participant record
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/participant.ParticipantResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not registered yet
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get my participant record
      tags:
      - Participant
  /api/participant/user:
    post:
      description: 'Register the authenticated user as a chat participant (idempotent:
        returns 409 if already registered)'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/participant.ParticipantResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Already registered
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Register as participant
      tags:
      - Participant
  /api/user/{user_id}:
    get:
      description: Get a user's public profile by ID
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.GetUserProfileResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get user profile
      tags:
      - User
  /api/user/avatar:
    post:
      consumes:
      - multipart/form-data
      description: Upload and replace the current user's avatar (jpeg/png/webp, max
        5 MB). The image is center-cropped and resized to 256×256.
      parameters:
      - description: Avatar image file
        in: formData
        name: avatar
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.UploadAvatarResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "413":
          description: Image Too Large
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload avatar
      tags:
      - User
  /api/user/profile:
    patch:
      consumes:
      - application/json
      description: Update the current user's display name
      parameters:
      - description: Profile update payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/user.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update profile
      tags:
      - User
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
